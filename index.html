<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- 【核心】严谨的移动端 Meta 标签：禁止缩放、适配刘海屏、禁止用户选中 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  
  <!-- 苹果 iOS 私有属性 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  
  <!-- 腾讯 X5 内核 (微信/QQ) 适配属性 -->
  <meta name="x5-fullscreen" content="true" />
  <meta name="x5-page-mode" content="app" />
  <meta name="browsermode" content="application" />
  
  <title>扑克塔防</title>
  
  <style>
    /* 全局重置，防止任何滚动条和默认交互 */
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: #000000; overflow: hidden;
      touch-action: none; /* 彻底禁止浏览器的默认手势(如下拉刷新、双击放大) */
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none; /* 禁止长按弹出菜单 */
    }

    /* 游戏容器：负责居中和自适应 */
    #game-container {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; justify-content: center; align-items: center;
    }

    /* 画布基础样式，通过 JS 动态控制缩放 */
    canvas {
      display: block;
      background-color: #2c2c2e;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    /* 纯 CSS Loading 动画 */
    #loading-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #1a1a1a; z-index: 9999;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: #fff; font-family: 'Courier New', Courier, monospace;
      transition: opacity 0.5s ease-out;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid #ffffff; border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- 首屏 Loading 区 -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <div id="loading-text">资源加载中...</div>
  </div>

  <!-- 游戏承载区 -->
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
