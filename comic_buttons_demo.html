<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Style Buttons Demo</title>
    <!-- 引入美漫风格字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Anton&display=swap" rel="stylesheet">
    <style>
        :root {
            --comic-black: #1A1A1D;
            --color-refresh: #00E5FF;
            /* 亮青色 */
            --color-endturn: #FFEA00;
            /* 明黄色 */
            --shadow-dist: 6px;
            --font-main: 'Bangers', 'Anton', sans-serif;
        }

        body {
            background-color: #2c2c2e;
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: var(--font-main);
        }

        /* 基础按钮样式 */
        .comic-btn {
            position: relative;
            padding: 12px 30px;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            color: white;
            cursor: pointer;
            border: 4px solid var(--comic-black);
            border-radius: 4px;
            /* 极小圆角 */

            /* 文字美化：描边增强漫画感 */
            -webkit-text-stroke: 1px var(--comic-black);
            letter-spacing: 1px;

            /* 速度感倾斜 */
            transform: skewX(-5deg);

            /* 硬阴影 */
            box-shadow: var(--shadow-dist) var(--shadow-dist) 0px var(--comic-black);

            /* 过渡动画 */
            transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;

            display: inline-flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            outline: none;
        }

        /* 刷新按钮颜色 */
        .btn-refresh {
            background-color: var(--color-refresh);
        }

        /* 结束回合按钮颜色 */
        .btn-endturn {
            background-color: var(--color-endturn);
            color: var(--comic-black);
            /* 黄色背景用黑色文字更波普 */
        }

        /* 悬停状态：轻微浮起，阴影拉长 */
        .comic-btn:hover {
            transform: skewX(-5deg) translate(-2px, -2px);
            box-shadow: 8px 8px 0px var(--comic-black);
        }

        /* 按下状态：机械回弹感，完全抵消阴影并平移 */
        .comic-btn:active {
            /* 平移量等于初始阴影偏移，营造按到底的视觉效果 */
            transform: skewX(-5deg) translate(var(--shadow-dist), var(--shadow-dist));
            box-shadow: 0px 0px 0px var(--comic-black);
        }

        /* 文字内容容器（防止 skew 影响文字显示，如果需要的话可以单独抵消，但美漫风通常整体倾斜） */
        .btn-content {
            display: inline-block;
        }
    </style>
</head>

<body>

    <!-- 刷新按钮 -->
    <button class="comic-btn btn-refresh">
        <span class="btn-content">🔄 REFRESH</span>
    </button>

    <!-- 结束回合按钮 -->
    <button class="comic-btn btn-endturn">
        <span class="btn-content">⌛ END TURN</span>
    </button>

</body>

</html>
