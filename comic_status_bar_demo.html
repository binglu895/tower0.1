<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Style Status Bar Demo</title>
    <!-- 引入美漫风格字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Anton&display=swap" rel="stylesheet">
    <style>
        :root {
            --comic-black: #1A1A1D;
            --hp-red: #FF2A2A;
            --deck-grey: #2B2B2B;
            --coin-gold: #FFD700;
            --badge-bg: #FFFFFF;
            --font-main: 'Bangers', 'Anton', sans-serif;
        }

        body {
            background-color: #333;
            margin: 0;
            padding: 20px;
            font-family: var(--font-main);
        }

        /* 顶部状态栏容器 */
        .status-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
        }

        /* 每个数据项的“徽章”容器 */
        .status-item {
            display: flex;
            align-items: center;
            background-color: var(--badge-bg);
            border: 3px solid var(--comic-black);
            border-radius: 50px;
            /* 胶囊形状 */
            padding: 5px 20px;
            box-shadow: 4px 4px 0px var(--comic-black);

            /* 轻微随机倾斜感 */
            transform: rotate(-2deg);
            transition: transform 0.2s ease;
        }

        .status-item:nth-child(even) {
            transform: rotate(2deg);
        }

        /* 内部图标 */
        .status-icon {
            font-size: 24px;
            margin-right: 10px;
        }

        /* 核心：美漫数字样式 */
        .status-value {
            font-size: 32px;
            font-weight: bold;
            line-height: 1;

            /* 黑色文字描边 */
            -webkit-text-stroke: 1.5px var(--comic-black);

            /* 3D 硬文字阴影 */
            text-shadow: 3px 3px 0px var(--comic-black);

            letter-spacing: 2px;
        }

        /* 颜色区分 */
        .hp .status-value {
            color: var(--hp-red);
        }

        .deck .status-value {
            color: var(--deck-grey);
        }

        .coin .status-value {
            color: var(--coin-gold);
        }

        /* 弹出动画类 */
        .pop-animation {
            animation: pop-bounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes pop-bounce {
            0% {
                transform: scale(1);
                rotate(0deg);
            }

            50% {
                transform: scale(1.5);
                rotate(5deg);
            }

            100% {
                transform: scale(1);
                rotate(0deg);
            }
        }

        /* 按钮：仅用于演示动画触发 */
        .controls {
            margin-top: 50px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            font-family: var(--font-main);
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="status-bar">
        <!-- 生命值 -->
        <div class="status-item hp">
            <span class="status-icon">❤️</span>
            <span id="hp-val" class="status-value">3</span>
        </div>

        <!-- 余牌 -->
        <div class="status-item deck">
            <span class="status-icon">🃏</span>
            <span id="deck-val" class="status-value">52</span>
        </div>

        <!-- 金币 -->
        <div class="status-item coin">
            <span class="status-icon">💰</span>
            <span id="coin-val" class="status-value">150</span>
        </div>
    </div>

    <!-- 交互演示脚本 -->
    <div class="controls">
        <button onclick="triggerPop('hp-val')">扣血 (❤️ POP)</button>
        <button onclick="triggerPop('coin-val')">加钱 (💰 POP)</button>
    </div>

    <script>
        function triggerPop(id) {
            const el = document.getElementById(id);
            // 简单重置动画
            el.classList.remove('pop-animation');
            void el.offsetWidth; // 触发回流以重新开始动画
            el.classList.add('pop-animation');
        }
    </script>

</body>

</html>
