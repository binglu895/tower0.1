<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Style Grid Board Demo</title>
    <!-- 引入美漫风格字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Anton&display=swap" rel="stylesheet">
    <style>
        :root {
            --comic-black: #1A1A1D;
            --board-bg: #2A0845;
            /* 深紫蓝 */
            --cell-highlight: #FF00FF;
            /* 荧光粉 */
            --font-main: 'Bangers', sans-serif;

            /* Halftone Pattern SVG Data URI */
            --halftone-pattern: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='3' cy='3' r='1.5' fill='%23000' fill-opacity='0.2'/%3E%3C/svg%3E");
            --halftone-inverted: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='3' cy='3' r='2' fill='%23FFF' fill-opacity='0.4'/%3E%3C/svg%3E");
        }

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: var(--font-main);
        }

        /* 棋盘容器 */
        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 80px);
            /* 5 列 */
            grid-template-rows: repeat(4, 95px);
            /* 4 行 */
            background-color: var(--board-bg);
            border: 6px solid var(--comic-black);
            box-shadow: 10px 10px 0px var(--comic-black);
            padding: 4px;
            gap: 2px;
            position: relative;
        }

        /* 单个格子 */
        .cell {
            position: relative;
            background-color: rgba(255, 255, 255, 0.05);
            border: 3px solid var(--comic-black);
            background-image: var(--halftone-pattern);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 格子内的占位符 */
        .cell::after {
            content: "+";
            font-size: 32px;
            color: rgba(255, 255, 255, 0.15);
            -webkit-text-stroke: 1px var(--comic-black);
        }

        /* 悬停高亮状态 (拖拽经过) */
        .cell.drag-over,
        .cell:hover {
            background-color: var(--cell-highlight);
            background-image: var(--halftone-inverted);
            transform: scale(1.08) translateY(-6px);
            box-shadow: 6px 6px 0px var(--comic-black);
            z-index: 10;
        }

        .cell.drag-over::after,
        .cell:hover::after {
            color: white;
            opacity: 0.8;
            transform: rotate(45deg);
            /* 加号变叉号的效果 */
        }

        /* 装饰用：给棋盘加一点漫画边框修饰 */
        .game-board::before {
            content: "BATTLE FIELD";
            position: absolute;
            top: -25px;
            left: 10px;
            background: #FFEA00;
            color: var(--comic-black);
            padding: 2px 10px;
            border: 3px solid var(--comic-black);
            font-size: 14px;
            transform: rotate(-2deg);
            z-index: 11;
        }
    </style>
</head>

<body>

    <div id="board" class="game-board">
        <!-- 自动生成 20 个格子 -->
        <script>
            const board = document.getElementById('board');
            for (let i = 0; i < 20; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                // 演示用：给其中一个格子加高亮类
                if (i === 7) cell.classList.add('drag-over');
                board.appendChild(cell);
            }
        </script>
    </div>

</body>

</html>
